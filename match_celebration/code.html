<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .liquid-glass {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
        }
        .crimson-glow {
            box-shadow: 0 0 40px rgba(150, 0, 24, 0.25);
        }
        .gold-pulse {
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
        }
        .mesh-gradient {
            background: radial-gradient(at 0% 0%, rgba(150, 0, 24, 0.15) 0px, transparent 50%),
                        radial-gradient(at 100% 100%, rgba(212, 175, 55, 0.1) 0px, transparent 50%),
                        radial-gradient(at 50% 50%, rgba(255, 255, 255, 1) 0px, transparent 80%);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-background font-body text-on-background selection:bg-primary-container selection:text-white overflow-hidden">
<!-- Celebration Screen Shell -->
<main class="relative min-h-screen w-full flex items-center justify-center mesh-gradient p-6">
<!-- Animated Background Elements (Visual Only) -->
<div class="absolute inset-0 overflow-hidden pointer-events-none">
<div class="absolute top-1/4 left-1/4 w-96 h-96 bg-primary-container/5 rounded-full blur-[100px]"></div>
<div class="absolute bottom-1/4 right-1/4 w-[500px] h-[500px] bg-secondary/5 rounded-full blur-[120px]"></div>
<!-- Particles -->
<div class="absolute top-20 right-20 w-3 h-3 bg-secondary rounded-full opacity-40"></div>
<div class="absolute bottom-40 left-10 w-2 h-2 bg-primary-container rounded-full opacity-30"></div>
<div class="absolute top-1/2 left-20 w-4 h-4 bg-secondary-fixed rounded-full opacity-20 blur-sm"></div>
</div>
<!-- The Celebration Card (Glass Pod) -->
<div class="relative z-10 w-full max-w-lg liquid-glass rounded-[3rem] p-10 md:p-16 text-center border border-white/40 shadow-2xl flex flex-col items-center">
<!-- Floating Academic Icon -->
<div class="mb-8 w-20 h-20 bg-gradient-to-br from-primary to-primary-container rounded-2xl flex items-center justify-center crimson-glow transform -rotate-6">
<span class="material-symbols-outlined text-white text-4xl" data-icon="auto_awesome">auto_awesome</span>
</div>
<!-- Main Headline -->
<h1 class="font-headline text-5xl md:text-6xl font-extrabold tracking-tighter text-on-background mb-4">
                It's a <span class="text-primary-container">Match!</span>
</h1>
<p class="font-body text-on-surface-variant text-lg max-w-xs mx-auto leading-relaxed mb-12">
                Your academic journey just found a perfect companion at Sejong.
            </p>
<!-- Overlapping Avatars Section -->
<div class="relative flex items-center justify-center mb-16 h-32 w-full">
<!-- Particle Explosion Background behind avatars -->
<div class="absolute inset-0 flex items-center justify-center">
<div class="w-48 h-48 bg-secondary/10 rounded-full blur-2xl"></div>
</div>
<!-- Avatar 1 -->
<div class="relative z-20 -mr-6 transform -rotate-3 transition-transform hover:rotate-0 duration-500">
<div class="w-28 h-28 md:w-36 md:h-36 rounded-full p-1.5 bg-white shadow-xl">
<img alt="Student Profile 1" class="w-full h-full object-cover rounded-full" data-alt="Portrait of a smiling college student wearing glasses" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAB23Z_0kAZ_Ju5Kl7zkXVAu5KrQuyUyjpGkbjnohwXX4-bA4zLKnK9XZE8Nt1C6yAGaFONrybIL-IZGLO1MJukJ3ZQ79WwSk0HgjRcKcxA1TAeUsBi2pbgdlifijlJQnwXHAXaaiMGV2RKm3TYbEFPsAkZmdoE_c0TBSbkGj2cJTEA1ckzRrkESagpvfjTXtzn3Xw61f-cwLSc_2ifH8OMeAoAa4svCbA88dV6-Xto6fRDk3jPTEuTE3VuZ0nEectpK1xxyKVKrUag"/>
</div>
<div class="absolute -bottom-2 -left-2 w-10 h-10 bg-secondary-container rounded-full flex items-center justify-center gold-pulse">
<span class="material-symbols-outlined text-on-secondary-container text-xl" data-icon="school">school</span>
</div>
</div>
<!-- Avatar 2 -->
<div class="relative z-10 -ml-6 transform rotate-6 transition-transform hover:rotate-0 duration-500">
<div class="w-28 h-28 md:w-36 md:h-36 rounded-full p-1.5 bg-white shadow-xl">
<img alt="Student Profile 2" class="w-full h-full object-cover rounded-full" data-alt="Close up of a female student smiling warmly" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBC_AWJuhDOu3fPSYXew3VG1M7v8ZqIFSkZ0QMm2AEyLlLz3axdz8-pm4UgMXREkwBLfOvaPtGqqTfdWuwqYG9cm2IBdyNVp3K5xZrzvXkMQHXi0F_DG-5ynws9RzCNJRwxKZex7NsrvwLogVEuydz6mVDxUlw_JloJq3AlhbnjlAucrLO8oQDTsCgQg6sXraYHe3rW1SlaFo-6qV1oHh1iYmwz9s4OYfQS4dXKd6tMCjrQDKO9T5U0_ekWYdndPrDLAG09Venz_Cf0"/>
</div>
<div class="absolute -top-2 -right-2 w-10 h-10 bg-primary-container rounded-full flex items-center justify-center crimson-glow">
<span class="material-symbols-outlined text-white text-xl" data-icon="favorite" style="font-variation-settings: 'FILL' 1;">favorite</span>
</div>
</div>
</div>
<!-- Actions Container -->
<div class="w-full space-y-6">
<!-- Message Now CTA -->
<button class="w-full bg-gradient-to-br from-primary to-primary-container text-white py-5 px-8 rounded-full font-headline font-bold text-lg crimson-glow hover:scale-[1.02] active:scale-95 transition-all flex items-center justify-center gap-3">
<span class="material-symbols-outlined" data-icon="forum" style="font-variation-settings: 'FILL' 1;">forum</span>
                    Message Now
                </button>
<!-- Keep Discovering Link -->
<button class="w-full py-2 text-on-surface-variant font-label text-sm uppercase tracking-widest font-bold hover:text-primary-container transition-colors active:scale-95 duration-200">
                    Keep Discovering
                </button>
</div>
</div>
<!-- Floating Decorative Glass Pods (Contextual UI) -->
<div class="absolute top-10 left-10 hidden lg:block">
<div class="liquid-glass border border-white/40 p-4 rounded-2xl shadow-sm rotate-6 flex items-center gap-3">
<div class="w-2 h-2 rounded-full bg-secondary"></div>
<span class="text-xs font-label uppercase tracking-tighter font-semibold">Study Match: 98%</span>
</div>
</div>
<div class="absolute bottom-20 right-10 hidden lg:block">
<div class="liquid-glass border border-white/40 p-4 rounded-2xl shadow-sm -rotate-3 flex items-center gap-3">
<span class="material-symbols-outlined text-primary-container text-sm" data-icon="groups">groups</span>
<span class="text-xs font-label uppercase tracking-tighter font-semibold">Shared Project: Lab B</span>
</div>
</div>
</main>
<!-- Navigation Suppressed for Focus: Transactional Screen Rule Applied -->
