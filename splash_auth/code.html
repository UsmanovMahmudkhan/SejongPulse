<span class="material-symbols-outlined text-5xl text-primary-container" style="font-variation-settings: 'FILL' 1;">sensors</span>
</div>
<h1 class="font-headline text-5xl font-extrabold tracking-tighter text-on-background mb-4">
                    Sejong <span class="text-primary-container">Pulse</span>
</h1>
<p class="text-on-surface-variant text-lg font-medium max-w-[280px] mx-auto leading-relaxed">

</div>

<div class="space-y-6">
<div class="text-center mb-4">

<span>Sign In with @sju.ac.kr</span>
<span class="material-symbols-outlined">arrow_forward</span>
</button>
<!-- Secondary Info -->
<div class="flex flex-col items-center space-y-4 pt-4">
<p class="text-sm text-on-surface-variant font-medium text-center">
                            No password required. A secure magic link will be sent to your academic inbox.
                        </p>
<div class="flex items-center gap-2">
<span class="w-1.5 h-1.5 rounded-full bg-secondary"></span>
<span class="text-[10px] font-label uppercase tracking-widest text-secondary font-bold">Secured by Academic ID</span>
</div>
</div>
</div>
</div>
